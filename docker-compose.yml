version: '3.8'

services:
  # Main MeshTradeBot Service
  meshtradebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshtradebot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_PROVIDER_TOKEN=${TELEGRAM_PROVIDER_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FREQTRADE_API_URL=http://freqtrade:8080
      - DATABASE_URL=sqlite:///./data/meshtradebot.db
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8433:8433"  # Webhook port for Freqtrade signals
    depends_on:
      - freqtrade
    networks:
      - meshtradebot-network
    restart: unless-stopped
    command: python main.py

  # Freqtrade Trading Engine
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    environment:
      - FREQTRADE__TELEGRAM__ENABLED=false
      - FREQTRADE__TELEGRAM__TOKEN=
      - FREQTRADE__TELEGRAM__CHAT_ID=
      - FREQTRADE__DRY_RUN=true
      - FREQTRADE__API_SERVER__LISTEN_IP_ADDRESS=0.0.0.0
      - FREQTRADE__API_SERVER__LISTEN_PORT=8080
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-your-secret-key-change-me}
    volumes:
      - ./freqtrade_config:/freqtrade/config
      - ./strategies:/freqtrade/user_data/strategies
      - ./data/freqtrade:/freqtrade/user_data
    ports:
      - "8080:8080"  # Freqtrade API port
    networks:
      - meshtradebot-network
    restart: unless-stopped
    command: trade --config config/default.json

networks:
  meshtradebot-network:
    driver: bridge

volumes:
  data:
  logs:
